<script>
    // --- Upstash Configuration ---
    const KV_URL = "https://settled-sunbird-88103.upstash.io";
    const KV_TOKEN = "gQAAAAAAAVgnAAIncDI4YWQ2YzEyYzg3Njg0NjE5YjUwNDU1M2E4Zjk1OGMyNnAyODgxMDM";

    // --- Game Functions ---
    function openGame(id) {
        const overlay = document.getElementById('game-overlay');
        const frame = document.getElementById('game-frame');
        overlay.style.display = 'block';
        
        if (id === 1) frame.src = "https://htmlxm.github.io/h/bitlife/";
        if (id === 2) frame.src = "https://crazygames.cdn.msnfun.com/9msvph3r5r2m/v3/index.html?msstart_sdk_init=eyJwYXJlbnRPcmlnaW4iOiJodHRwczovL3d3dy5tc24uY29tIiwiY2xpZW50SWQiOiIwNTVFRUJBNTdCNUE2MTlCMkM1MUZDODM3QUYwNjA3RSIsImxvY2FsZSI6InpoLWhrIiwiZW50cnlQb2ludElkIjoiIiwic3dpdGNoR2FtZVBheWxvYWQiOnsic3dpdGNoZWRUbyI6Ijltc3ZwaDNyNXIybSIsInZhbHVlIjp7fX19";
        if (id === 3) frame.src = "https://crazygames.cdn.msnfun.com/9n02lr0qrbm2/v7/index.html?msstart_sdk_init=eyJwYXJlbnRPcmlnaW4iOiJodHRwczovL3d3dy5tc24uY29tIiwiY2xpZW50SWQiOiIzMDNGNjcwM0JFQ0I2MTI0MDM5NTcwMkJCRjgyNjA2QSIsImxvY2FsZSI6InpoLWhrIiwiZW50cnlQb2ludElkIjoiIiwic3dpdGNoR2FtZVBheWxvYWQiOnsic3dpdGNoZWRUbyI6IjluMDJscjBxcmJtMiIsInZhbHVlIjp7fX19";
    }

    function closeGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('game-frame').src = "";
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeGame();
    });

    // --- Core Logic (Upstash & Login) ---
    async function redisCmd(cmd) {
        try {
            const response = await fetch(KV_URL, {
                headers: { Authorization: `Bearer ${KV_TOKEN}` },
                method: 'POST',
                body: JSON.stringify(cmd)
            });
            const data = await response.json();
            return data.result;
        } catch (e) { return null; }
    }

    async function loadUsersFromCloud() {
        const raw = await redisCmd(["GET", "wiki_user_data"]);
        if (!raw) {
            const initial = [
                { username: 'alphabet', password: "asdfghjkl;'", role: 'user', status: 'active' },
                { username: 'admin', password: 'admin123', role: 'admin', status: 'active' }
            ];
            await saveUsersToCloud(initial);
            return initial;
        }
        return typeof raw === 'string' ? JSON.parse(raw) : raw;
    }

    async function saveUsersToCloud(users) {
        await redisCmd(["SET", "wiki_user_data", JSON.stringify(users)]);
    }

    async function handleLogin() {
        const u = document.getElementById('wiki_user').value;
        const p = document.getElementById('wiki_pass').value;
        const err = document.getElementById('login-err');
        const btn = document.getElementById('login-btn');

        btn.innerText = "驗證中...";
        const users = await loadUsersFromCloud();
        const user = users.find(x => x.username === u && x.password === p);

        if (user) {
            if (user.status === 'suspended') {
                err.innerText = "您的帳號已被停權。";
                err.classList.remove('hidden');
                btn.innerText = "登入";
                return;
            }
            document.getElementById('login-screen').classList.add('hidden');
            if (user.role === 'admin') {
                document.getElementById('admin-page').classList.remove('hidden');
                renderUserTable(users);
            } else {
                document.getElementById('report-page').classList.remove('hidden');
                document.getElementById('display-username').innerText = u;
            }
        } else {
            err.innerText = "帳號或密碼錯誤。";
            err.classList.remove('hidden');
            btn.innerText = "登入";
        }
    }

    // --- Admin Dashboard Logic ---
    function renderUserTable(users) {
        const body = document.getElementById('user-table-body');
        body.innerHTML = '';
        users.forEach(u => {
            if (u.role === 'admin') return;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-4 border-b font-medium text-sm">${u.username}</td>
                <td class="p-4 border-b text-xs ${u.status === 'active' ? 'text-green-600' : 'text-red-600'} font-bold">${u.status === 'active' ? '正常' : '停權'}</td>
                <td class="p-4 border-b flex gap-2">
                    <button onclick="dbToggleStatus('${u.username}')" class="bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-[10px]">狀態</button>
                    <button onclick="dbDeleteUser('${u.username}')" class="text-red-600 hover:bg-red-50 px-2 py-1 rounded text-[10px]">移除</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    async function dbAddUser() {
        const u = document.getElementById('newU').value;
        const p = document.getElementById('newP').value;
        if (!u || !p) return alert("請輸入完整資料");

        const users = await loadUsersFromCloud();
        if (users.find(x => x.username === u)) return alert("用戶名已存在");

        users.push({ username: u, password: p, role: 'user', status: 'active' });
        await saveUsersToCloud(users);
        
        document.getElementById('newU').value = '';
        document.getElementById('newP').value = '';
        renderUserTable(users);
    }

    async function dbToggleStatus(username) {
        const users = await loadUsersFromCloud();
        const user = users.find(x => x.username === username);
        if (user) {
            user.status = user.status === 'active' ? 'suspended' : 'active';
            await saveUsersToCloud(users);
            renderUserTable(users);
        }
    }

    async function dbDeleteUser(username) {
        if (!confirm(`確定要移除研究員 ${username} 嗎？`)) return;
        let users = await loadUsersFromCloud();
        users = users.filter(x => x.username !== username);
        await saveUsersToCloud(users);
        renderUserTable(users);
    }
</script>
